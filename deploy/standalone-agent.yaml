# Standalone docsclaw deployment — no SPIRE, no Kagenti, no OPA.
# Just a ConfigMap-driven agentic runtime with tool-use capabilities.
#
# Prerequisites:
#   oc new-project docsclaw   (or use any namespace)
#
# Configure LLM provider (pick ONE):
#
#   Anthropic:
#     cp secrets/anthropic_example.yaml secrets/anthropic.yaml
#     # edit anthropic.yaml — set LLM_API_KEY
#     oc apply -f secrets/anthropic.yaml
#
#   OpenAI:
#     cp secrets/openai_example.yaml secrets/openai.yaml
#     # edit openai.yaml — set LLM_API_KEY
#     oc apply -f secrets/openai.yaml
#
#   MaaS (LiteLLM proxy for open-source models on OpenShift AI):
#     cp secrets/maas_example.yaml secrets/maas.yaml
#     # edit maas.yaml — set LLM_API_KEY and LLM_BASE_URL
#     oc apply -f secrets/maas.yaml
#
# All three create the same "llm-secret" name, so only apply one.
# The secret carries LLM_PROVIDER, LLM_MODEL, LLM_API_KEY, and
# (for OpenAI/MaaS) LLM_BASE_URL. See deploy/README.md for details.
#
# Deploy:
#   oc apply -f standalone-agent.yaml
#
# Test:
#   curl -X POST https://$(oc get route docsclaw -o jsonpath='{.spec.host}')/a2a \
#     -H "Content-Type: application/json" \
#     -d '{"jsonrpc":"2.0","method":"message/send","id":"1",
#          "params":{"message":{"messageId":"m1","role":"user",
#          "parts":[{"kind":"text","text":"List files in /tmp"}]}}}'

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: docsclaw-config
data:
  system-prompt.txt: |
    You are a helpful research assistant with access to tools.

    You can:
    - Execute shell commands (exec)
    - Fetch web pages (web_fetch)
    - Read and write files in your workspace (read_file, write_file)

    When given a task, break it into steps and use your tools to complete it.
    Be concise in your responses. Show your work.
  agent-card.json: |
    {
      "name": "docsclaw",
      "description": "Standalone research agent with tool-use capabilities",
      "version": "2.0.0",
      "protocolVersion": "0.3.0",
      "url": "http://docsclaw:8000",
      "skills": [
        {
          "id": "research",
          "name": "Research",
          "description": "Research topics using web and local tools",
          "tags": ["research", "analysis"],
          "examples": ["Fetch the Go release notes and summarize them"]
        }
      ],
      "capabilities": {},
      "defaultInputModes": ["application/json"],
      "defaultOutputModes": ["text/plain"]
    }
  agent-config.yaml: |
    tools:
      allowed:
        - exec
        - web_fetch
        - read_file
        - write_file
      exec:
        timeout: 30
        max_output: 50000
      workspace: /workspace
    loop:
      max_iterations: 10

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docsclaw
  labels:
    app: docsclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docsclaw
  template:
    metadata:
      labels:
        app: docsclaw
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: docsclaw
          image: ghcr.io/redhat-et/docsclaw:2e4171a
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          args:
            - serve
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8100
              name: health
          env:
            - name: DOCSCLAW_SERVICE_PORT
              value: "8000"
            # Fallback workspace directory — used only when
            # agent-config.yaml does not set tools.workspace:
            # - name: DOCSCLAW_WORKSPACE
            #   value: "/data/agent"
          envFrom:
            - secretRef:
                name: llm-secret
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: agent-config
              mountPath: /config/agent
              readOnly: true
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: agent-config
          configMap:
            name: docsclaw-config
        - name: workspace
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: docsclaw
  labels:
    app: docsclaw
spec:
  selector:
    app: docsclaw
  ports:
    - port: 8000
      targetPort: 8000
      name: http

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: docsclaw
  annotations:
    haproxy.router.openshift.io/timeout: 120s
  labels:
    app: docsclaw
spec:
  to:
    kind: Service
    name: docsclaw
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
