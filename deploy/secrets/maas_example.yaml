# Copy to maas.yaml, fill in your API key, then apply:
#   cp maas_example.yaml maas.yaml
#   oc apply -f maas.yaml
#
# MaaS (Model as a Service) uses the LiteLLM proxy for
# open-source models hosted on OpenShift AI.
apiVersion: v1
kind: Secret
metadata:
  name: llm-secret
stringData:
  LLM_API_KEY: ""           # your MaaS API key
  LLM_PROVIDER: "litellm"
  LLM_MODEL: "qwen3-14b"
  # LLM_MODEL: "deepseek-r1-distill-qwen-14b"
  LLM_BASE_URL: "https://litellm-prod.apps.maas.redhatworkshops.io/v1"
