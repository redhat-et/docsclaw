# Copy to openai.yaml, fill in your API key, then apply:
#   cp openai_example.yaml openai.yaml
#   oc apply -f openai.yaml
apiVersion: v1
kind: Secret
metadata:
  name: llm-secret
stringData:
  LLM_API_KEY: ""           # your OpenAI API key
  LLM_PROVIDER: "openai"
  LLM_MODEL: "gpt-5.4"
  # LLM_MODEL: "gpt-5.4-mini"
  # LLM_MODEL: "gpt-5.4-nano"
  LLM_BASE_URL: "https://api.openai.com/v1"
