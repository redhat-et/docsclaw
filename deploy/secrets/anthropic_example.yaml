# Copy to anthropic.yaml, fill in your API key, then apply:
#   cp anthropic_example.yaml anthropic.yaml
#   oc apply -f anthropic.yaml
apiVersion: v1
kind: Secret
metadata:
  name: llm-secret
stringData:
  LLM_API_KEY: ""           # your Anthropic API key
  LLM_PROVIDER: "anthropic"
  LLM_MODEL: "claude-sonnet-4-6"
  # LLM_MODEL: "claude-opus-4-6"
  # LLM_MODEL: "claude-haiku-4-5"
