apiVersion: docsclaw.io/v1alpha1
kind: SkillCard
metadata:
  name: checklist-auditor
  namespace: official
  ref: quay.io/docsclaw/skill-checklist-auditor
  version: 1.0.0
  description: >-
    Audit checklists for consistency against a corporate standard.
    Identifies gaps, inconsistencies, and missing steps. Use when
    verifying process documents across departments.
  author: Red Hat ET
  license: Apache-2.0
  metadata:
    category: operations
spec:
  tools:
    required: [read_file]
    optional: [write_file]
  allowedTools: "Read Write"
  dependencies:
    skills: []
    toolPacks: []
  resources:
    estimatedMemory: 32Mi
    estimatedCPU: 100m
  compatibility:
    minAgentVersion: "0.5.0"
    environment: ""
