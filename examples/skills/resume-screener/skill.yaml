apiVersion: docsclaw.io/v1alpha1
kind: SkillCard
metadata:
  name: resume-screener
  namespace: official
  ref: quay.io/docsclaw/skill-resume-screener
  version: 1.0.0
  description: >-
    Screen resumes against a job description. Scores candidates on
    qualification alignment, experience match, and fit. Use when HR
    uploads resumes for a job opening.
  author: Red Hat ET
  license: Apache-2.0
  metadata:
    category: human-resources
spec:
  tools:
    required: [read_file]
    optional: [write_file]
  allowedTools: "Read Write"
  dependencies:
    skills: []
    toolPacks: []
  resources:
    estimatedMemory: 32Mi
    estimatedCPU: 100m
  compatibility:
    minAgentVersion: "0.5.0"
    environment: ""
