# Skill Discovery Test — verifies AgentCard population from mounted skills
#
# This manifest tests that discovered skills automatically appear in
# the AgentCard at /.well-known/agent-card.json. The agent-card.json
# has an EMPTY skills array — all skills come from discovery.
#
# Two skill sources are demonstrated:
#   1. OCI image volume (document-summarizer from quay.io)
#   2. ConfigMap (code-review, inline)
#
# Skills are mounted at /skills (separate from /config/agent) using
# the --skills-dir flag. This avoids a Kubernetes limitation where
# image volumes mounted as subdirectories of a ConfigMap volume
# appear empty.
#
# Prerequisites:
#   oc project panni-docsclaw
#   oc apply -f image-volume-scc.yaml   (one-time, needs cluster-admin)
#   oc apply -f llm-secret.yaml
#
# Deploy:
#   oc apply -f skill-discovery-test.yaml
#
# Test:
#   ROUTE=$(oc get route skill-discovery-test -o jsonpath='{.spec.host}')
#
#   # Verify skills appear in the AgentCard (should show 2 skills)
#   curl -s https://$ROUTE/.well-known/agent-card.json | jq '.skills'
#
#   # Verify with a2a CLI
#   a2a discover https://$ROUTE
#
#   # Test skill-driven task
#   a2a send --timeout 120s https://$ROUTE \
#     "Summarize this memo: The team shipped 3 features in Q1,
#      resolved 12 bugs, and reduced p95 latency from 800ms to 200ms."

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: skill-discovery-test-config
  namespace: panni-docsclaw
  labels:
    app: skill-discovery-test
data:
  system-prompt.txt: |
    You are a test agent for validating skill discovery.
    When a task matches a known skill, load it first for guidance.
    Be concise.
  agent-card.json: |
    {
      "name": "skill-discovery-test",
      "description": "Test agent for AgentCard skill injection",
      "version": "1.0.0",
      "protocolVersion": "0.3.0",
      "url": "http://skill-discovery-test:8000",
      "skills": [],
      "capabilities": {},
      "defaultInputModes": ["application/json"],
      "defaultOutputModes": ["text/plain"]
    }
  agent-config.yaml: |
    tools:
      allowed:
        - read_file
        - write_file
        - web_fetch
      workspace: /tmp/agent-workspace
    loop:
      max_iterations: 5

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: skill-discovery-test-code-review
  namespace: panni-docsclaw
  labels:
    app: skill-discovery-test
data:
  SKILL.md: |
    ---
    name: code-review
    description: Review code files for bugs, style, and security issues
    ---

    # Code review skill

    When asked to review code:

    1. Use `read_file` to read the file(s) to review
    2. Analyze for:
       - **Bugs**: logic errors, off-by-one, nil derefs
       - **Security**: injection, hardcoded secrets, unsafe input handling
       - **Style**: naming, formatting, idiomatic patterns
    3. Report findings with severity (Critical / Important / Minor)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skill-discovery-test
  namespace: panni-docsclaw
  labels:
    app: skill-discovery-test
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
    a2a-agent.demo/protocol: a2a
    a2a-agent.demo/type: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skill-discovery-test
  template:
    metadata:
      labels:
        app: skill-discovery-test
        kagenti.io/type: agent
        protocol.kagenti.io/a2a: ""
        a2a-agent.demo/protocol: a2a
        a2a-agent.demo/type: agent
    spec:
      serviceAccountName: docsclaw-agent
      securityContext:
        runAsNonRoot: true
      containers:
        - name: docsclaw
          image: ghcr.io/redhat-et/docsclaw:5229121
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          args:
            - serve
            - --config-dir
            - /config/agent
            - --skills-dir
            - /skills
            - --listen-plain-http
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8100
              name: health
          envFrom:
            - secretRef:
                name: llm-secret
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: agent-config
              mountPath: /config/agent
              readOnly: true
            - name: skill-document-summarizer
              mountPath: /skills/document-summarizer
              readOnly: true
            - name: skill-code-review
              mountPath: /skills/code-review
              readOnly: true
            - name: workspace
              mountPath: /tmp/agent-workspace
      volumes:
        - name: agent-config
          configMap:
            name: skill-discovery-test-config
        - name: skill-document-summarizer
          image:
            reference: quay.io/skillimage/business/document-summarizer:1.0.0-testing
            pullPolicy: Always
        - name: skill-code-review
          configMap:
            name: skill-discovery-test-code-review
        - name: workspace
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: skill-discovery-test
  namespace: panni-docsclaw
  labels:
    app: skill-discovery-test
spec:
  selector:
    app: skill-discovery-test
  ports:
    - port: 8000
      targetPort: 8000
      name: http

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: skill-discovery-test
  namespace: panni-docsclaw
  annotations:
    haproxy.router.openshift.io/timeout: 120s
  labels:
    app: skill-discovery-test
spec:
  to:
    kind: Service
    name: skill-discovery-test
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
