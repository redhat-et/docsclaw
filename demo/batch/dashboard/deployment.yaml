# Dashboard for the batch demo.
#
# Prerequisites:
#   oc apply -f deployment.yaml    (this file — creates SA, Role, etc.)
#
# The dashboard manages agent Deployments and Services in
# its own namespace via the ServiceAccount.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard
  labels:
    app: dashboard

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dashboard
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dashboard
subjects:
  - kind: ServiceAccount
    name: dashboard

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  labels:
    app: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      serviceAccountName: dashboard
      securityContext:
        runAsNonRoot: true
      containers:
        - name: dashboard
          image: ghcr.io/redhat-et/docsclaw-dashboard:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8090
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  labels:
    app: dashboard
spec:
  selector:
    app: dashboard
  ports:
    - port: 8090
      targetPort: 8090
      name: http

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dashboard
  annotations:
    haproxy.router.openshift.io/timeout: 300s
  labels:
    app: dashboard
spec:
  to:
    kind: Service
    name: dashboard
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
